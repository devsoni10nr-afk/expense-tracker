<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="auth-container">

  <!-- TOP BUTTONS -->
  <div class="tabs">
    <button onclick="showLogin()">Login</button>
    <button onclick="showRegister()">Signup</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h2>Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none;">
    <h2>Signup</h2>

    <input id="regUser" placeholder="New Username">
    <input id="regPass" type="password" placeholder="New Password">

    <button onclick="register()">Register</button>
  </div>

</div>

<script>

function showLogin(){
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registerForm").style.display = "none";
}

function showRegister(){
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registerForm").style.display = "block";
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let savedUser = localStorage.getItem("username");
  let savedPass = localStorage.getItem("password");

  if(u === savedUser && p === savedPass){
    localStorage.setItem("login", "true");
    window.location.href = "index.html";
  } else {
    alert("Wrong credentials");
  }
}

function register(){
  let u = document.getElementById("regUser").value;
  let p = document.getElementById("regPass").value;

  if(!u || !p){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("username", u);
  localStorage.setItem("password", p);

  alert("Registered successfully!");

  showLogin(); // auto switch to login
}

</script>

</body>
</html>
